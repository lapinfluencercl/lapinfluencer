<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opciones de producto | Lapinfluencer</title>
    <meta name="description" content="Revisa opciones, medidas y valores de productos personalizados Lapinfluencer: figuras personalizadas de mascotas, retratos de mascotas y arte hecho a mano en Chile." />
    <meta property="og:title" content="Opciones de producto | Lapinfluencer" />
    <meta property="og:description" content="Elige detalles para tu regalo personalizado de mascota y agenda tu pedido por WhatsApp." />
    <meta property="og:image" content="https://lapinfluencer.cl/assets/inicio-productos-sin-fondo.png" />
    <meta property="og:url" content="https://lapinfluencer.cl/opciones.html" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html#inicio" aria-label="Ir al inicio">
        <img class="brand-logo" src="assets/logo-lapinfluencer.png" alt="Lapinfluencer, regalos con sentido" />
      </a>
      <nav class="top-nav" aria-label="Navegación principal">
        <a href="index.html#inicio">Home</a>
        <a href="index.html#productos">Productos</a>
        <a href="index.html#agenda">Agenda</a>
        <a href="index.html#envios">Envíos</a>
        <a href="index.html#preguntas">Preguntas frecuentes</a>
        <a href="index.html#acerca">Acerca</a>
      </nav>
      <div class="header-actions">
        <button class="cart-button" type="button" id="cart-open-button" aria-label="Abrir carrito">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M6 6h15l-2 8H8L6 3H3" />
            <circle cx="9" cy="20" r="1.5" />
            <circle cx="18" cy="20" r="1.5" />
          </svg>
          <span id="cart-count">0</span>
        </button>
        <div class="social-links" aria-label="Redes sociales">
          <a href="https://www.tiktok.com/@lapinfluencer" target="_blank" rel="noopener" aria-label="TikTok Lapinfluencer">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M16.7 3c.3 2.2 1.6 3.8 3.8 4.2v3.3c-1.3 0-2.5-.4-3.7-1.1v5.9c0 3.4-2.3 5.7-5.7 5.7-3 0-5.5-2.3-5.5-5.3 0-3.2 2.6-5.5 5.9-5.3.3 0 .6.1.9.1v3.4c-.3-.1-.6-.2-1-.2-1.4 0-2.4.8-2.4 2 0 1.1.9 1.9 2.1 1.9 1.3 0 2.1-.8 2.1-2.4V3h3.5Z" />
            </svg>
          </a>
          <a href="https://www.instagram.com/lapinfluencer/" target="_blank" rel="noopener" aria-label="Instagram Lapinfluencer">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <rect x="4" y="4" width="16" height="16" rx="5" />
              <circle cx="12" cy="12" r="4" />
              <circle cx="17" cy="7" r="1.2" />
            </svg>
          </a>
          <a href="https://wa.me/56985781006" target="_blank" rel="noopener" aria-label="WhatsApp Lapinfluencer">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M5.2 19 6.4 15.3A7.6 7.6 0 1 1 9 17.8L5.2 19Z" />
              <path d="M9.1 8.4c.2-.4.4-.4.7-.4h.5c.2 0 .4.1.5.4l.7 1.6c.1.2.1.4-.1.6l-.4.5c-.1.1-.2.3 0 .5.5.9 1.3 1.7 2.3 2.2.2.1.4.1.5-.1l.6-.7c.2-.2.4-.2.6-.1l1.6.8c.3.1.4.3.4.6 0 .6-.5 1.4-1.1 1.6-.5.2-1.1.3-2-.1-2.5-.8-4.6-2.9-5.5-5.3-.3-.8-.2-1.4 0-1.8Z" />
            </svg>
          </a>
        </div>
      </div>
    </header>

    <main>
      <section class="product-page">
        <a class="back-link" id="category-back-link" href="index.html#productos">Atrás a productos</a>
        <div class="product-page-heading">
          <p class="eyebrow" id="product-category">Producto</p>
          <h1 id="product-title">Opciones</h1>
          <p id="product-summary"></p>
          <figure class="product-detail-image" id="product-detail-image" hidden></figure>
        </div>

        <div class="product-options" id="product-options"></div>
      </section>
    </main>

    <aside class="cart-drawer" id="cart-drawer" aria-label="Carrito" hidden>
      <div class="cart-panel">
        <div class="cart-header">
          <h2>Carrito</h2>
          <button class="icon-button" type="button" id="cart-close-button" aria-label="Cerrar carrito">x</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-agenda" id="cart-agenda" hidden></div>
        <p class="cart-empty" id="cart-empty">Tu carrito está vacío.</p>
        <div class="cart-summary">
          <p class="cart-total" id="cart-total">Total referencial: 0 CLP</p>
          <p class="cart-final" id="cart-final">Total del pedido: 0 CLP</p>
          <p class="cart-deposit" id="cart-deposit" hidden></p>
          <label class="coupon-field">
            <span>Código cupón/descuento</span>
            <div class="coupon-control">
              <input type="text" id="cart-coupon" placeholder="Ingresa tu cupón" autocomplete="off" />
              <button type="button" id="cart-coupon-apply">Aplicar</button>
            </div>
            <small id="cart-coupon-message"></small>
          </label>
          <p class="cart-warning" id="cart-warning" hidden></p>
        </div>
        <p class="cart-note">Al agendar pedido serás redirigido a WhatsApp para coordinar los detalles.</p>
        <button class="button secondary cart-continue" id="cart-continue-button" type="button">Seguir comprando</button>
        <a class="button primary cart-whatsapp" id="cart-whatsapp" href="https://wa.me/56985781006" target="_blank" rel="noopener">Agendar Pedido</a>
      </div>
    </aside>

    <script src="opciones.js"></script>
  </body>
</html>
